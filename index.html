<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UG World</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;}

body{
  background:url('bg.jpg') no-repeat center center/cover;
  height:100vh;
  overflow:hidden; /* no scroll */
  color:#111;
}

/* NAV */
nav{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  position:absolute;
  width:100%;
  top:0;
}

.nav-container{
  display:flex;
  align-items:center;
  justify-content:space-between;
  width:90%;
}

.logo{
  width:45px;
  height:45px;
  background:#000;
  border-radius:12px;
}

nav ul{
  display:flex;
  gap:30px;
  list-style:none;
  font-weight:500;
}

/* HERO CENTER */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:42px;
}

.hero p{
  margin-top:10px;
}

/* MAIN CTA BUTTON */
.hero button{
  margin-top:25px;
  padding:18px 40px;
  border:none;
  background:#000;
  color:#fff;
  font-size:16px;
  border-radius:40px;
  cursor:pointer;
  transition:0.3s;
}

.hero button:hover{
  transform:scale(1.05);
}

/* 3D OBJECT */
.model{
  width:60px;
  height:60px;
}

</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-container">
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="logo"></div>
      <span style="font-weight:600;font-size:18px;">UG World</span>
    </div>

    <ul>
      <li>Home</li>
      <li>About</li>
      <li>Social</li>
      <li>CEO</li>
      <li>Agenda</li>
    </ul>

    <div class="model"></div>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <div>
    <h1>UG World</h1>
    <p>Join the developer community</p>
    <button onclick="goToRegister()">Register Now</button>
  </div>
</div>

<script>
function goToRegister(){
  window.location.href = "registration.html";
}
</script>

</body>
</html>
