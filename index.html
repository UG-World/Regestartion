<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UG World</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;}

body{
  background:url('bg.jpg') no-repeat center center/cover;
  height:100vh;
  overflow:hidden;
  color:#111;
}

/* NAV */
nav{
  display:flex;
  align-items:center;
  justify-content:center;
  padding:15px;
  position:absolute;
  width:100%;
  top:0;
}

.nav-container{
  display:flex;
  align-items:center;
  justify-content:space-between;
  width:95%;
}

.logo{
  width:40px;
  height:40px;
  border-radius:10px;
}

/* NAV BUTTON GROUP */
nav ul{
  display:flex;
  gap:25px;
  list-style:none;
  font-weight:500;
  padding:10px 20px;
  border-radius:30px;
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(6px);
  flex-wrap:nowrap;
}

nav ul li{
  cursor:pointer;
  white-space:nowrap;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
}

.hero h1{
  font-size:42px;
}

.hero p{
  margin-top:10px;
}

/* VIDEO BUTTON */
.video-btn{
  position:relative;
  margin-top:25px;
  width:220px;
  height:60px;
  border-radius:40px;
  overflow:hidden;
  cursor:pointer;
  display:inline-block;
  transition:transform .25s ease;
}

.video-btn video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  filter:blur(0px);
  transform:scale(1.05);
}

.video-btn::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.15);
}

.video-btn span{
  position:relative;
  z-index:2;
  color:white;
  font-weight:bold;
  line-height:60px;
}

.video-btn:hover{
  transform:scale(1.05);
}

.model{
  width:50px;
  height:50px;
}

/* ================= MOBILE ================= */
@media (max-width: 768px){

  .nav-container{
    flex-direction:column;
    gap:10px;
  }

  nav ul{
    gap:15px;
    padding:8px 15px;
    font-size:13px;
    justify-content:center;
  }

  .hero h1{
    font-size:28px;
  }

  .video-btn{
    width:180px;
    height:50px;
  }

  .video-btn span{
    line-height:50px;
    font-size:14px;
  }

}

</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="nav-container">
    <div style="display:flex;align-items:center;gap:10px;">
      <img src="logo.jpg" class="logo" />
      <span style="font-weight:600;font-size:16px;">UG World</span>
    </div>

    <ul>
      <li onclick="goPage('index.html')">Home</li>
      <li onclick="goPage('about.html')">About</li>
      <li onclick="goPage('social.html')">Social</li>
      <li onclick="goPage('ceo.html')">CEO</li>
      <li onclick="goPage('agenda.html')">Agenda</li>
    </ul>

    <div class="model"></div>
  </div>
</nav>

<!-- HERO -->
<div class="hero">
  <div>
    <h1>UG World</h1>
    <p>Join the developer community</p>

    <div class="video-btn" onclick="goToRegister()">
      <video autoplay muted loop>
        <source src="btn.mp4" type="video/mp4">
      </video>
      <span>Register Now</span>
    </div>

  </div>
</div>

<script>
function goToRegister(){
  window.location.href = "regestration.html";
}

function goPage(page){
  window.location.href = page;
}
</script>

</body>
</html>
