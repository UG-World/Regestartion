<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UG World - Registration</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;}

body{
  height:100vh;
  overflow:hidden;
  background:url('bg1.png') no-repeat center center/cover;
}

/* NAV SIMPLIFIED */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  position:absolute;
  width:100%;
  top:0;
}

.logo-box{
  display:flex;
  align-items:center;
  gap:8px;
}

.logo{
  width:40px;
  height:40px;
  border-radius:10px;
}

.back-btn{
  padding:8px 15px;
  border:none;
  border-radius:20px;
  background:rgba(0,0,0,0.6);
  color:white;
  cursor:pointer;
}

/* FORM */
.container{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:10px;
}

.form-box{
  width:90%;
  max-width:350px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.2);
  backdrop-filter:blur(5px);
  text-align:center;
}

.form-box h2{
  margin-bottom:15px;
}

input,select{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
}

button.submit{
  width:100%;
  padding:12px;
  border:none;
  background:black;
  color:white;
  border-radius:10px;
  cursor:pointer;
}

/* MOBILE */
@media (max-width:480px){
  .logo{
    width:35px;
    height:35px;
  }

  .back-btn{
    padding:6px 12px;
    font-size:12px;
  }

  .form-box{
    padding:18px;
  }
}

</style>
</head>
<body>

<!-- NAV -->
<nav>
  <div class="logo-box">
    <img src="logo.png" class="logo">
    <span style="font-weight:600;">UG World</span>
  </div>

  <button class="back-btn" onclick="goBack()">Back</button>
</nav>

<!-- FORM -->
<div class="container">
  <div class="form-box">
    <h2>Registration</h2>

    <form action="https://formspree.io/f/mlgvwoeb" method="POST">
      <input type="text" name="name" placeholder="Name" required>
      <input type="email" name="email" placeholder="Gmail" required>
      <input type="tel" name="phone" placeholder="Phone Number" required>

      <select name="category" required>
        <option value="">Select Category</option>
        <option>App Development</option>
        <option>Web Development</option>
      </select>

      <select name="type" required>
        <option value="">Select Type</option>
        <option>Frontend</option>
        <option>Backend</option>
      </select>

      <button class="submit" type="submit">Submit</button>
    </form>

  </div>
</div>

<script>
function goBack(){
  window.location.href = "index.html";
}
</script>

</body>
</html>
